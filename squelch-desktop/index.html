<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' http://127.0.0.1:* http://localhost:* https://*.ts.net https://*" />
    <title>squelch</title>
    <!-- Apply the persisted theme before first paint so there's no flash.
         Light is the default; "dark" is opt-in via the header toggle. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("squelch-theme");
          document.documentElement.setAttribute(
            "data-theme",
            t === "dark" ? "dark" : "light",
          );
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
